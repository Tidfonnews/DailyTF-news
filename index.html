<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tidfon news</title>

<style>
body {
  font-family: Arial, sans-serif;
  max-width: 1000px;
  margin: 20px auto;
  padding: 0 16px;
}

h1 {
  text-align: center;
}

.header {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 20px;
  font-size: 20px;
  font-weight: bold;
}

button {
  padding: 6px 12px;
  font-size: 16px;
  cursor: pointer;
}

.calendar {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 8px;
  margin-top: 20px;
}

.weekday, .day {
  border: 1px solid #ddd;
  border-radius: 10px;
  min-height: 90px;
  padding: 8px;
}

.weekday {
  background: #f5f5f5;
  font-weight: bold;
  text-align: center;
}

.day-number {
  font-weight: bold;
  margin-bottom: 6px;
}

.has-photo {
  background: #f0f8ff;
}

#viewer {
  margin-top: 30px;
  text-align: center;
}

#viewer-images {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 12px;
  margin-top: 12px;
}

#viewer-images img {
  width: 100%;
  border-radius: 12px;
}
</style>
</head>

<body>

<h1>
  <span style="color: #02D674;">Tid</span>
  <span style="color: #FF40D6;">fon</span>
  news
</h1>

<div class="header">
  <button onclick="prevMonth()">←</button>
  <div id="month-title"></div>
  <button onclick="nextMonth()">→</button>
</div>

<div class="calendar" id="calendar"></div>

<div id="viewer">
  <div id="viewer-date"></div>
  <div id="viewer-images"></div>
</div>

<script>

let currentYear = 2026;
let currentMonth = 4;

const photos = {

"2026-04-07": ["2026-04-07.JPG"],
"2026-04-10": ["2026-04-10-1.JPG", "2026-04-10-2.JPG"],
"2026-04-11": ["2026-04-11.JPG"],
"2026-04-12": ["2026-04-12.JPG"],
"2026-04-13": ["2026-04-13-1.JPG", "2026-04-13-2.JPG"],
"2026-04-14": ["2026-04-14.JPG"],
"2026-04-15": ["2026-04-15.JPG"],
"2026-04-16": ["2026-04-16.JPG"],
"2026-04-17": ["2026-04-17.JPG"]

};

const weekdays = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

const calendar = document.getElementById("calendar");
const monthTitle = document.getElementById("month-title");
const viewerDate = document.getElementById("viewer-date");
const viewerImages = document.getElementById("viewer-images");

function renderCalendar() {

calendar.innerHTML = "";

const firstDay = new Date(currentYear, currentMonth - 1, 1);
const lastDay = new Date(currentYear, currentMonth, 0);

const daysInMonth = lastDay.getDate();
const startWeekday = firstDay.getDay();

monthTitle.textContent =
firstDay.toLocaleString("en-US", {
month: "long",
year: "numeric"
});

weekdays.forEach(day => {

const div = document.createElement("div");
div.className = "weekday";
div.textContent = day;

calendar.appendChild(div);

});

for (let i = 0; i < startWeekday; i++) {

const div = document.createElement("div");
div.className = "day";

calendar.appendChild(div);

}

for (let d = 1; d <= daysInMonth; d++) {

const dateStr =
currentYear + "-" +
String(currentMonth).padStart(2,"0") + "-" +
String(d).padStart(2,"0");

const div = document.createElement("div");
div.className = "day";

const number = document.createElement("div");
number.className = "day-number";
number.textContent = d;

div.appendChild(number);

if (photos[dateStr]) {

div.classList.add("has-photo");

const link = document.createElement("a");
link.href = "#";

link.textContent =
"View " +
photos[dateStr].length +
" photo" +
(photos[dateStr].length > 1 ? "s" : "");

link.onclick = (e) => {

e.preventDefault();

viewerDate.textContent = dateStr;
viewerImages.innerHTML = "";

photos[dateStr].forEach(file => {

const img = document.createElement("img");
img.src = file;

viewerImages.appendChild(img);

});

};

div.appendChild(link);

}

calendar.appendChild(div);

}

}

function nextMonth() {

currentMonth++;

if (currentMonth > 12) {

currentMonth = 1;
currentYear++;

}

renderCalendar();

}

function prevMonth() {

currentMonth--;

if (currentMonth < 1) {

currentMonth = 12;
currentYear--;

}

renderCalendar();

}

renderCalendar();

</script>

</body>
</html>
